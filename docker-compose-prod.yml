---
services:
  www:
    container_name: tools_www
    image: ghcr.io/nginx/nginx-unprivileged:stable
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      lomo-homes-viewer:
        condition: service_healthy
      clip2gist:
        condition: service_healthy
      gh-dashboard:
        condition: service_healthy
      www2s:
        condition: service_healthy
      www2epub:
        condition: service_healthy
      homepage:
        condition: service_started
      taboo:
        condition: service_started
      unit-converter:
        condition: service_started
      yaml-formatter:
        condition: service_started
      ocr:
        condition: service_started
      emoji-identifier:
        condition: service_started
      exiftools:
        condition: service_started
      ghissue2md:
        condition: service_started
      graphviz-visualizer:
        condition: service_started
      link-extractor:
        condition: service_started
      qr:
        condition: service_started
      render-markdown:
        condition: service_started
      bingo-creator:
        condition: service_started
      json-utils:
        condition: service_started
      matter:
        condition: service_started
      tfps:
        condition: service_started
      anki-converter:
        condition: service_started
      md-converter:
        condition: service_started
      contact-sheet-creator:
        condition: service_started
      xteink-wallpaper-converter:
        condition: service_started
      film-format-converter:
        condition: service_started
    networks:
      - backend
    volumes:
      - "./nginx/html/:/usr/share/nginx/html/:ro"
      - "./nginx/conf.d/:/etc/nginx/conf.d/"
      - "tools_homepage:/var/www/html/homepage:ro"
      - "tools_taboo:/var/www/html/taboo:ro"
      - "tools_unit-converter:/var/www/html/unit-converter:ro"
      - "tools_yaml-formatter:/var/www/html/yaml-formatter:ro"
      - "tools_ocr:/var/www/html/ocr:ro"
      - "tools_emoji-identifier:/var/www/html/emoji-identifier:ro"
      - "tools_exiftools:/var/www/html/exiftools:ro"
      - "tools_ghissue2md:/var/www/html/ghissue2md:ro"
      - "tools_graphviz-visualizer:/var/www/html/graphviz-visualizer:ro"
      - "tools_link-extractor:/var/www/html/link-extractor:ro"
      - "tools_qr:/var/www/html/qr:ro"
      - "tools_render-markdown:/var/www/html/render-markdown:ro"
      - "tools_bingo-creator:/var/www/html/bingo-creator:ro"
      - "tools_json-utils:/var/www/html/json-utils:ro"
      - "tools_matter:/var/www/html/matter:ro"
      - "tools_tfps:/var/www/html/tfps:ro"
      - "tools_anki-converter:/var/www/html/anki-converter:ro"
      - "tools_md-converter:/var/www/html/md-converter:ro"
      - "tools_contact-sheet-creator:/var/www/html/contact-sheet-creator:ro"
      - "tools_xteink-wallpaper-converter:/var/www/html/xteink-wallpaper-converter:ro"
      - "tools_film-format-converter:/var/www/html/film-format-converter:ro"

  # -------------------------
  # Runtime apps
  # -------------------------
  lomo-homes-viewer:
    container_name: tools_lomo-homes-viewer
    hostname: lomo-homes-viewer
    image: ghcr.io/toozej/tools:lomo-homes-viewer
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://lomo-homes-viewer:3000/lomo-homes-viewer/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    env_file: ./apps/lomo-homes-viewer/app.env
    networks:
      - backend

  clip2gist:
    container_name: tools_clip2gist
    hostname: clip2gist
    image: ghcr.io/toozej/tools:clip2gist
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://clip2gist:3000/clip2gist/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    env_file: ./apps/clip2gist/app.env
    networks:
      - backend

  gh-dashboard:
    container_name: tools_gh-dashboard
    hostname: gh-dashboard
    image: ghcr.io/toozej/tools:gh-dashboard
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://gh-dashboard:3000/gh-dashboard/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    env_file: ./apps/gh-dashboard/app.env
    networks:
      - backend

  www2s:
    container_name: tools_www2s
    hostname: www2s
    image: ghcr.io/toozej/tools:www2s
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://www2s:3000/www2s/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    env_file: ./apps/www2s/app.env
    networks:
      - backend

  www2epub:
    container_name: tools_www2epub
    hostname: www2epub
    image: ghcr.io/toozej/tools:www2epub
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://www2epub:3000/www2epub/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend

  # -------------------------
  # Builder services
  # -------------------------
  homepage:
    container_name: tools_homepage
    image: ghcr.io/toozej/tools:homepage
    volumes:
      - tools_homepage:/app/out
    command: ["sleep", "5"]

  taboo:
    container_name: tools_taboo
    image: ghcr.io/toozej/tools:taboo
    volumes:
      - tools_taboo:/app/out
    command: ["sleep", "5"]

  unit-converter:
    container_name: tools_unit-converter
    image: ghcr.io/toozej/tools:unit-converter
    volumes:
      - tools_unit-converter:/app/out
    command: ["sleep", "5"]

  yaml-formatter:
    container_name: tools_yaml-formatter
    image: ghcr.io/toozej/tools:yaml-formatter
    volumes:
      - tools_yaml-formatter:/app/out
    command: ["sleep", "5"]

  ocr:
    container_name: tools_ocr
    image: ghcr.io/toozej/tools:ocr
    volumes:
      - tools_ocr:/app/out
    command: ["sleep", "5"]

  emoji-identifier:
    container_name: tools_emoji-identifier
    image: ghcr.io/toozej/tools:emoji-identifier
    volumes:
      - tools_emoji-identifier:/app/out
    command: ["sleep", "5"]

  exiftools:
    container_name: tools_exiftools
    image: ghcr.io/toozej/tools:exiftools
    volumes:
      - tools_exiftools:/app/out
    command: ["sleep", "5"]

  ghissue2md:
    container_name: tools_ghissue2md
    image: ghcr.io/toozej/tools:ghissue2md
    volumes:
      - tools_ghissue2md:/app/out
    command: ["sleep", "5"]

  graphviz-visualizer:
    container_name: tools_graphviz-visualizer
    image: ghcr.io/toozej/tools:graphviz-visualizer
    volumes:
      - tools_graphviz-visualizer:/app/out
    command: ["sleep", "5"]

  link-extractor:
    container_name: tools_link-extractor
    image: ghcr.io/toozej/tools:link-extractor
    volumes:
      - tools_link-extractor:/app/out
    command: ["sleep", "5"]

  qr:
    container_name: tools_qr
    image: ghcr.io/toozej/tools:qr
    volumes:
      - tools_qr:/app/out
    command: ["sleep", "5"]

  render-markdown:
    container_name: tools_render-markdown
    image: ghcr.io/toozej/tools:render-markdown
    volumes:
      - tools_render-markdown:/app/out
    command: ["sleep", "5"]

  bingo-creator:
    container_name: tools_bingo-creator
    image: ghcr.io/toozej/tools:bingo-creator
    volumes:
      - tools_bingo-creator:/app/out
    command: ["sleep", "5"]

  json-utils:
    container_name: tools_json-utils
    image: ghcr.io/toozej/tools:json-utils
    volumes:
      - tools_json-utils:/app/out
    command: ["sleep", "5"]

  matter:
    container_name: tools_matter
    image: ghcr.io/toozej/tools:matter
    volumes:
      - tools_matter:/app/out
    command: ["sleep", "5"]

  tfps:
    container_name: tools_tfps
    image: ghcr.io/toozej/tools:tfps
    volumes:
      - tools_tfps:/app/out
    command: ["sleep", "5"]

  anki-converter:
    container_name: tools_anki-converter
    image: ghcr.io/toozej/tools:anki-converter
    volumes:
      - tools_anki-converter:/app/out
    command: ["sleep", "5"]

  md-converter:
    container_name: tools_md-converter
    image: ghcr.io/toozej/tools:md-converter
    volumes:
      - tools_md-converter:/app/out
    command: ["sleep", "5"]

  contact-sheet-creator:
    container_name: tools_contact-sheet-creator
    image: ghcr.io/toozej/tools:contact-sheet-creator
    volumes:
      - tools_contact-sheet-creator:/app/out
    command: ["sleep", "5"]

  xteink-wallpaper-converter:
    container_name: tools_xteink-wallpaper-converter
    image: ghcr.io/toozej/tools:xteink-wallpaper-converter
    volumes:
      - tools_xteink-wallpaper-converter:/app/out
    command: ["sleep", "5"]

  film-format-converter:
    container_name: tools_film-format-converter
    image: ghcr.io/toozej/tools:film-format-converter
    volumes:
      - tools_film-format-converter:/app/out
    command: ["sleep", "5"]

volumes:
  tools_homepage:
  tools_taboo:
  tools_unit-converter:
  tools_yaml-formatter:
  tools_ocr:
  tools_emoji-identifier:
  tools_exiftools:
  tools_ghissue2md:
  tools_graphviz-visualizer:
  tools_link-extractor:
  tools_qr:
  tools_render-markdown:
  tools_bingo-creator:
  tools_json-utils:
  tools_matter:
  tools_tfps:
  tools_anki-converter:
  tools_md-converter:
  tools_contact-sheet-creator:
  tools_xteink-wallpaper-converter:
  tools_film-format-converter:

networks:
  backend:
    driver: bridge
