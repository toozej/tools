---
name: ci

on:
  pull_request:
  workflow_dispatch:
  push:
  schedule:
    - cron: "0 1 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  discover-apps:
    runs-on: ubuntu-24.04
    outputs:
      apps: ${{ steps.discover.outputs.apps }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get list of apps to build
        id: discover
        run: |
          # Find all services in docker-compose that have a build context and runtime profile
          # Extract app name from build.context (e.g., ./apps/homepage -> homepage)
          apps=$(yq -r '.services | to_entries[] | select(.value.build != null and .value.profiles != null and ((.value.profiles | contains(["build"])) or (.value.profiles | contains(["runtime"])))) | .value.build.context | sub("^\\./apps/", "")' docker-compose-dev.yml | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "apps=$apps" >> "$GITHUB_OUTPUT"
          echo "Found apps: $apps"

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          check-latest: true
      - name: Run pre-commit
        run: |
          pip install pre-commit
          make pre-commit

  tests:
    runs-on: ubuntu-latest
    needs: discover-apps
    strategy:
      fail-fast: false
      matrix:
        apps: ${{ fromJson(needs.discover-apps.outputs.apps) }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: oven-sh/setup-bun@v2
        if: hashFiles(format('apps/{0}/package.json', matrix.apps)) != ''
      - uses: actions/setup-go@v6
        if: hashFiles(format('apps/{0}/go.mod', matrix.apps)) != ''
        with:
          go-version: '^1.26'
          check-latest: true
      - name: Run tests
        run: |
          make build test APP=${{ matrix.apps }}

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  codeql-analyze:
    name: codeql-analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          check-latest: true
      - uses: github/codeql-action/init@v4 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v4 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
      - uses: github/codeql-action/analyze@v4 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha

  trivy-scan-source:
    name: trivy-scan-source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
